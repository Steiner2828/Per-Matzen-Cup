<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Per Matzen Cup 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --coral: #E8624A; --coral-light: #f07a65;
    --teal: #3aacb8; --dark: #141414; --darker: #0a0a0a;
    --surface: #1e1e1e; --surface2: #272727;
    --text: #f0ede8; --text-muted: #888; --border: #333;
    --win: #4caf7d; --loss: #e05252; --draw: #f0a042;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--darker); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }
  header {
    background:linear-gradient(160deg,#1a1a1a 0%,#111 100%);
    border-bottom:1px solid var(--border); padding:16px 32px;
    display:flex; align-items:center; gap:16px; position:sticky; top:0; z-index:100;
  }
  .logo-circle { width:48px; height:48px; background:var(--coral); border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:20px; }
  header h1 { font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:2px; }
  header h1 span { color:var(--coral); }
  nav { margin-left:auto; display:flex; gap:4px; }
  nav button { background:none; border:none; color:var(--text-muted); font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; padding:8px 16px; border-radius:8px; cursor:pointer; transition:all 0.2s; }
  nav button:hover { color:var(--text); background:var(--surface); }
  nav button.active { color:var(--coral); background:rgba(232,98,74,0.12); }
  main { max-width:1100px; margin:0 auto; padding:36px 24px; }
  .section-title { font-family:'Bebas Neue',sans-serif; font-size:34px; letter-spacing:3px; margin-bottom:24px; display:flex; align-items:center; gap:12px; }
  .section-title::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,var(--border),transparent); }
  .view { display:none; } .view.active { display:block; }

  /* TABELLE */
  .standings-wrap { background:var(--surface); border-radius:16px; overflow:hidden; border:1px solid var(--border); }
  .standings-wrap table { width:100%; border-collapse:collapse; }
  .standings-wrap th { background:var(--coral); padding:13px 18px; text-align:left; font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:#fff; }
  .standings-wrap th.center { text-align:center; }
  .standings-wrap td { padding:15px 18px; border-top:1px solid var(--border); font-size:14px; vertical-align:middle; }
  .standings-wrap tr:hover td { background:rgba(255,255,255,0.02); }
  .rank { font-family:'Bebas Neue',sans-serif; font-size:20px; color:var(--text-muted); width:36px; }
  .rank.top { color:var(--coral); }
  .team-cell { display:flex; align-items:center; gap:10px; font-weight:500; }
  .team-logo-small { border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; color:#fff; flex-shrink:0; }
  .stat-cell { text-align:center; font-weight:600; font-size:14px; }
  .pts-cell { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--coral); text-align:center; }
  .kast-cell { text-align:center; font-size:13px; color:var(--text-muted); }

  /* SPIELTAGE */
  .matchdays-grid { display:flex; flex-direction:column; gap:20px; }
  .matchday-card { background:var(--surface); border-radius:16px; border:1px solid var(--border); overflow:hidden; }
  .matchday-header { background:var(--coral); padding:12px 22px; display:flex; align-items:center; gap:14px; border-bottom:none; }
  .matchday-number { font-family:'Bebas Neue',sans-serif; font-size:30px; color:#fff; line-height:1; }
  .matchday-info { display:flex; flex-direction:column; gap:2px; }
  .matchday-label { font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.7); }
  .matchday-dates { font-size:13px; color:#fff; font-weight:500; }
  .matches-list { padding:4px 0; }
  .match-row { display:flex; align-items:center; padding:13px 22px; gap:12px; cursor:pointer; transition:background 0.15s; position:relative; }
  .match-row:hover { background:rgba(232,98,74,0.06); }
  .match-row + .match-row { border-top:1px solid var(--border); }
  .match-date-tag { width:76px; flex-shrink:0; }
  .match-day-name { font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text-muted); }
  .match-date-num { font-size:12px; font-weight:600; color:var(--text); }
  .match-teams { flex:1; display:flex; align-items:center; gap:10px; }
  .match-team { display:flex; align-items:center; gap:8px; flex:1; }
  .match-team.right { flex-direction:row; text-align:left; }
  .match-team-name { font-size:13px; font-weight:500; }
  .match-score-display { display:flex; align-items:center; gap:5px; background:var(--surface2); border-radius:8px; padding:5px 12px; flex-shrink:0; min-width:64px; justify-content:center; margin:0 12px; }
  .match-score-display span { font-family:'Bebas Neue',sans-serif; font-size:18px; }
  .match-score-display .sep { color:var(--text-muted); font-size:13px; }
  .match-arrow { color:var(--coral); font-size:14px; opacity:0; transition:opacity 0.15s; }
  .match-row:hover .match-arrow { opacity:1; }

  /* DETAIL */
  .detail-select-hint { text-align:center; color:var(--text-muted); padding:60px 20px; font-size:15px; }
  .detail-card-wrap { display:flex; flex-direction:column; gap:20px; }
  .detail-match-selector { background:var(--surface); border-radius:12px; border:1px solid var(--border); padding:16px 20px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .detail-match-selector label { font-size:12px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--text-muted); }
  .detail-match-selector select { background:var(--surface2); border:1px solid var(--border); color:var(--text); font-family:'DM Sans',sans-serif; font-size:13px; padding:8px 12px; border-radius:8px; outline:none; cursor:pointer; flex:1; min-width:200px; }
  .detail-card { background:#192028; border-radius:16px; overflow:hidden; border:1px solid var(--border); }
  .detail-card-title { background:var(--surface2); padding:14px 24px; text-align:center; font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:3px; border-bottom:none; }
  .detail-location-bar { background:var(--coral); padding:10px 24px; text-align:center; font-size:13px; font-weight:500; color:#fff; }
  .detail-teams-row { display:flex; gap:16px; padding:20px 20px 0; }
  .detail-team-panel { flex:1; background:var(--surface); border-radius:12px; border:1px solid var(--border); overflow:hidden; }
  .detail-team-header { padding:16px 18px; text-align:center; border-bottom:1px solid var(--border); display:flex; flex-direction:column; align-items:center; gap:10px; }
  .detail-team-logo { width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:700; color:#fff; }
  .detail-team-name { font-size:15px; font-weight:600; }
  .detail-col-headers { display:grid; grid-template-columns:28px 1fr 52px 72px; gap:6px; padding:7px 14px; background:rgba(0,0,0,0.25); border-bottom:none; }
  .detail-col-headers span { font-size:9px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; color:var(--text-muted); }
  .detail-col-headers span:nth-child(3), .detail-col-headers span:nth-child(4) { text-align:right; }
  .detail-player-row { display:grid; grid-template-columns:28px 1fr 52px 72px; gap:6px; padding:10px 14px; border-top:1px solid rgba(255,255,255,0.05); align-items:center; font-size:13px; }
  .detail-player-row .pnum { font-family:'Bebas Neue',sans-serif; font-size:16px; color:var(--coral); }
  .detail-player-row .pval { text-align:right; font-weight:600; }
  .detail-totals-bar { padding:10px 14px; border-top:1px solid var(--border); background:rgba(0,0,0,0.2); display:flex; gap:20px; font-size:12px; }
  .detail-totals-bar span { color:var(--text-muted); }
  .detail-totals-bar strong { color:var(--text); }
  .detail-totals-bar .sp-val { color:var(--coral); }
  .detail-final-scores { display:flex; gap:16px; padding:16px 20px 20px; }
  .detail-final-score { flex:1; border-radius:10px; padding:14px; text-align:center; font-family:'Bebas Neue',sans-serif; font-size:42px; line-height:1; }

  /* MODAL */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:1000; display:flex; align-items:center; justify-content:center; padding:16px; opacity:0; pointer-events:none; transition:opacity 0.25s; }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:20px; width:100%; max-width:720px; max-height:90vh; overflow-y:auto; transform:translateY(20px); transition:transform 0.25s; }
  .modal-overlay.open .modal { transform:translateY(0); }
  .modal-header { background:var(--darker); padding:16px 24px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:2; }
  .modal-match-info { font-size:12px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-muted); }
  .modal-close { background:var(--surface2); border:1px solid var(--border); color:var(--text); width:30px; height:30px; border-radius:7px; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; transition:background 0.15s; }
  .modal-close:hover { background:var(--coral); }
  .modal-location-row { padding:12px 24px; background:var(--surface2); border-bottom:1px solid var(--border); display:flex; gap:12px; align-items:center; }
  .modal-location-row label { font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--text-muted); white-space:nowrap; }
  .modal-location-row input { flex:1; background:var(--surface); border:1px solid var(--border); color:var(--text); font-family:'DM Sans',sans-serif; font-size:13px; padding:8px 12px; border-radius:8px; outline:none; }
  .modal-location-row input:focus { border-color:var(--teal); }
  .modal-teams-grid { display:flex; gap:16px; padding:16px 24px 0; }
  .modal-team-col { flex:1; }
  .modal-team-col-header { display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--surface2); border-radius:10px 10px 0 0; border:1px solid var(--border); border-bottom:none; }
  .modal-team-col-logo { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; color:#fff; font-size:11px; }
  .modal-team-col-name { font-size:13px; font-weight:600; }
  .modal-col-headers { display:grid; grid-template-columns:24px 1fr 56px 68px; gap:6px; padding:6px 12px; background:rgba(0,0,0,0.3); border:1px solid var(--border); border-top:none; border-bottom:none; }
  .modal-col-headers span { font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text-muted); }
  .modal-col-headers span:nth-child(3), .modal-col-headers span:nth-child(4) { text-align:center; }
  .modal-player-rows { border:1px solid var(--border); border-top:none; border-radius:0 0 10px 10px; overflow:hidden; }
  .modal-player-row { display:grid; grid-template-columns:24px 1fr 56px 68px; align-items:center; gap:6px; padding:9px 12px; border-top:1px solid var(--border); background:var(--darker); }
  .modal-player-row:first-child { border-top:none; }
  .modal-player-row-num { font-family:'Bebas Neue',sans-serif; font-size:16px; color:var(--coral); }
  .minput { background:var(--surface2); border:1px solid var(--border); color:var(--text); font-family:'DM Sans',sans-serif; outline:none; border-radius:7px; padding:6px 8px; font-size:13px; width:100%; transition:border-color 0.15s; }
  .minput:focus { border-color:var(--coral); }
  .minput.center { text-align:center; }
  .modal-footer { padding:14px 24px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px; position:sticky; bottom:0; background:var(--surface); z-index:2; }
  .btn-save { background:var(--coral); color:#fff; border:none; border-radius:10px; padding:10px 24px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:background 0.15s; }
  .btn-save:hover { background:var(--coral-light); }
  .btn-cancel { background:var(--surface2); color:var(--text-muted); border:1px solid var(--border); border-radius:10px; padding:10px 24px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer; }

  @media(max-width:640px) {
    /* Header */
    header { padding:10px 12px; gap:10px; }
    header h1 { font-size:18px; letter-spacing:1px; }
    .logo-circle { width:36px; height:36px; }

    /* Nav: scrollable row */
    nav { width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch; flex-wrap:nowrap; gap:2px; margin-left:0; padding-bottom:2px; }
    nav::-webkit-scrollbar { display:none; }
    nav button { padding:6px 10px; font-size:10px; white-space:nowrap; flex-shrink:0; }

    /* Main */
    main { padding:14px 10px; }
    .section-title { font-size:24px; margin-bottom:16px; }

    /* Stilling table */
    .standings-wrap th, .standings-wrap td { padding:10px 8px; font-size:12px; }
    .rank { font-size:16px; width:24px; }
    .pts-cell { font-size:18px; }
    .team-cell { gap:6px; }

    /* Kampe */
    .match-row { padding:10px 12px; gap:8px; }
    .match-date-tag { width:52px; }
    .match-team-name { font-size:11px; }
    .match-score-display { min-width:50px; padding:4px 8px; margin:0 4px; }
    .match-score-display span { font-size:15px; }
    .matchday-header { padding:10px 14px; }
    .matchday-number { font-size:24px; }

    /* Kampdetails */
    .detail-teams-row { flex-direction:column; }
    .detail-match-selector { padding:12px; }
    .detail-match-selector select { min-width:0; font-size:12px; }
    .detail-col-headers { grid-template-columns:22px 1fr 44px 60px; }
    .detail-player-row { grid-template-columns:22px 1fr 44px 60px; font-size:12px; }
    .detail-final-score { font-size:32px; }
    .detail-location-bar { font-size:11px; padding:8px 12px; }

    /* Modal */
    .modal { border-radius:14px; }
    .modal-teams-grid { flex-direction:column; }
    .modal-location-row { flex-wrap:wrap; gap:8px; padding:10px 14px; }
    .modal-location-row input, .modal-location-row select { font-size:12px; }
    #modal-day { width:120px !important; }
    #modal-date { width:100px !important; }

    /* Spillerstatistik - hide less important cols */
    .hide-mobile { display:none; }
  }
  .btn-export { background:var(--coral); color:#fff; border:none; border-radius:10px; padding:9px 18px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:background 0.15s; white-space:nowrap; }
  .btn-export:hover { background:var(--coral-light); }
</style>
</head>

function logoHtml(id, size=32) {
  const t = getTeam(id);
  if(teamLogos[id]) {
    return `<div class="team-logo-small" style="width:${size}px;height:${size}px;background:transparent;overflow:hidden;flex-shrink:0"><img src="${teamLogos[id]}" style="width:100%;height:100%;object-fit:contain;border-radius:50%"></div>`;
  }
  return `<div class="team-logo-small" style="background:${t.color};width:${size}px;height:${size}px;font-size:${Math.round(size*0.34)}px">${t.abbr}</div>`;
}
const sumKast = ps => ps.reduce((s,p)=>s+(parseInt(p.kast)||0),0);
const sumSP   = ps => ps.reduce((s,p)=>s+(parseInt(p.sp)||0),0);
const hasData = d => d.home_players.some(p=>p.kast!=='');
const matchPts= d => {
  if(!hasData(d)) return {h:null,a:null};
  const hS=sumSP(d.home_players), aS=sumSP(d.away_players);
  if(hS>aS)  return {h:2,a:0};
  if(aS>hS)  return {h:0,a:2};
  return {h:1,a:1};
};

function computeStandings() {
  const st = {};
  teams.forEach(t => { st[t.id]={w:0,d:0,l:0,pts:0,played:0,kast:0,sp:0,form:[]}; });
  schedule.forEach((s,i) => {
    const d=matchData[i], p=matchPts(d);
    if(p.h===null) return;
    const [h,a]=[s[3],s[4]];
    st[h].played++; st[a].played++;
    st[h].kast+=sumKast(d.home_players); st[a].kast+=sumKast(d.away_players);
    st[h].sp+=p.h; st[a].sp+=p.a;
    if(p.h>p.a){st[h].w++;st[h].pts+=2;st[h].form.push('W');st[a].l++;st[a].form.push('L');}
    else if(p.a>p.h){st[a].w++;st[a].pts+=2;st[a].form.push('W');st[h].l++;st[h].form.push('L');}
    else{st[h].d++;st[h].pts++;st[h].form.push('D');st[a].d++;st[a].pts++;st[a].form.push('D');}
  });
  const sorted=teams.slice().sort((a,b)=>st[b.id].pts!==st[a.id].pts?st[b.id].pts-st[a.id].pts:st[b.id].sp-st[a.id].sp);
  document.getElementById('standings-body').innerHTML=sorted.map((t,i)=>{
    const s=st[t.id];
    const trophies = t.titles.map(y => `<span title="${y}" style="font-size:13px;position:relative;display:inline-flex;align-items:center;justify-content:center;margin-left:4px" class="trophy-badge">🏆<span style="position:absolute;bottom:-1px;font-size:8px;font-weight:700;color:#fff;text-shadow:0 0 2px #000;line-height:1">${y}</span></span>`).join('');
    return `<tr>
      <td class="rank ${i<1?'top':''}">#${i+1}</td>
      <td><div class="team-cell">${logoHtml(t.id,34)}<span>${t.name}</span>${trophies}</div></td>
      <td class="stat-cell">${s.played}</td>
      <td class="kast-cell">${s.kast||'—'}</td>
      <td class="stat-cell">${s.sp||'—'}</td>
      <td class="pts-cell">${s.pts}</td>
    </tr>`;
  }).join('');
}

function renderMatchdays() {
  const groups={};
  schedule.forEach((s,i)=>{ if(!groups[s[0]])groups[s[0]]=[]; groups[s[0]].push({s,i}); });
  document.getElementById('matchdays-container').innerHTML=Object.keys(groups).map(gd=>{
    const matches=groups[gd];
    const dates=[...new Set(matches.map(m=>m.s[2]))];
    const rows=matches.map(({s,i})=>{
      const p=matchPts(matchData[i]);
      const sc=p.h!==null
        ?`<div class="match-score-display"><span>${p.h}</span><span class="sep">:</span><span>${p.a}</span></div>`
        :`<div class="match-score-display"><span style="color:var(--text-muted)">-</span><span class="sep">:</span><span style="color:var(--text-muted)">-</span></div>`;
      return `<div class="match-row" onclick="openModal(${i})">
        <div class="match-date-tag"><div class="match-day-name">${s[1]}</div><div class="match-date-num">${s[2]}</div></div>
        <div class="match-teams">
          <div class="match-team">${logoHtml(s[3],26)}<span class="match-team-name">${getTeam(s[3]).name}</span></div>
          ${sc}
          <div class="match-team right" style="padding-left:60px">${logoHtml(s[4],26)}<span class="match-team-name">${getTeam(s[4]).name}</span></div>
        </div>
        <span class="match-arrow">›</span>
      </div>`;
    }).join('');
    return `<div class="matchday-card">
      <div class="matchday-header">
        <div class="matchday-number">${gd}</div>
        <div class="matchday-info"><div class="matchday-label">Spilledag</div><div class="matchday-dates">${dates.join(' & ')}</div></div>
      </div>
      <div class="matches-list">${rows}</div>
    </div>`;
  }).join('');
}

const playerRegistry = {
  'hs':  ['Niels Jørgensen', 'Mads Christensen', 'Brian Christensen', 'Niels Jørgen Jensen', 'Nicolai Tang Sten', 'Martin Jensen'],
  'tah': ['Vuong Van Nguyen', 'Stig Terp', 'Mogens Franck', 'Seyed Hashemi', 'Marc Svanholm Sørensen', 'Adam Nissen'],
  'bw':  ['Simon Telge', 'Marcel Steiner', 'Michael Christiansen', 'Ole Schov', 'Nikolaj Dralle', ''],
  'ofc': ['Andreas Hansen', 'Ricky Sørensen', 'Rasmus Kloch', 'Sune Jørgensen', 'Tommy Mikkelsen', ''],
  'bde': ['Kristian Bast', 'Bo Feldt Graversen', 'Christian Lærkedahl', 'Frederik Mikuta', 'Philip Fiil Eldridge', ''],
  'ae':  ['Jens Qvist', 'Claus Andersen', 'Frank Christiansen', 'Peter Vilsbøll', 'Hans Peter Langkilde', 'Albert Jonsson'],
};

function renderPlayers() {
  // Build a stats map: key = "teamId:playerIndex"
  const stats = {};
  teams.forEach(t => {
    playerRegistry[t.id].forEach((name, pi) => {
      if(!name) return; // skip empty slots
      const key = t.id+':'+pi;
      stats[key] = { name: name, teamId: t.id, sp: 0, kast: 0, games: 0 };
    });
  });

  schedule.forEach((s, i) => {
    const d = matchData[i];
    if(!hasData(d)) return;
    const homeId = s[3], awayId = s[4];
    d.home_players.forEach((p, pi) => {
      const key = homeId+':'+pi;
      if(stats[key]) {
        if(p.name && p.name.trim()) stats[key].name = p.name.trim();
        stats[key].sp    += parseInt(p.sp)   || 0;
        stats[key].kast  += parseInt(p.kast) || 0;
        stats[key].games += 1;
      }
    });
    d.away_players.forEach((p, pi) => {
      const key = awayId+':'+pi;
      if(stats[key]) {
        if(p.name && p.name.trim()) stats[key].name = p.name.trim();
        stats[key].sp    += parseInt(p.sp)   || 0;
        stats[key].kast  += parseInt(p.kast) || 0;
        stats[key].games += 1;
      }
    });
  });

  const rows = Object.values(stats)
    .map(r => ({ ...r, quote: r.games > 0 ? r.sp / r.games : 0 }))
    .sort((a,b) => b.quote !== a.quote ? b.quote - a.quote : b.sp !== a.sp ? b.sp - a.sp : b.kast - a.kast);
  const team = id => teams.find(t=>t.id===id);

  document.getElementById('players-body').innerHTML = rows.map((r, i) => {
    const t = team(r.teamId);
    return `<tr>
      <td class="rank ${i===0?'top':''}">#${i+1}</td>
      <td><div class="team-cell" style="gap:8px"><span style="font-weight:500">${r.name}</span></div></td>
      <td><div class="team-cell">${logoHtml(t.id,28)}<span style="font-size:13px;color:var(--text-muted)">${t.name}</span></div></td>
      <td class="stat-cell hide-mobile">${r.games}</td>
      <td class="kast-cell hide-mobile">${r.kast || '—'}</td>
      <td class="pts-cell">${r.sp || '—'}</td>
      <td class="stat-cell" style="color:var(--teal);font-family:'Bebas Neue',sans-serif;font-size:20px">${r.games > 0 ? r.quote.toFixed(2) : '—'}</td>
    </tr>`;
  }).join('');
}

function populateDetailSelect() {
  const sel=document.getElementById('detail-select');
  const cur=sel.value;
  sel.innerHTML='<option value="">— Vælg kamp —</option>';
  schedule.forEach((s,i)=>{
    const o=document.createElement('option');
    o.value=i;
    o.textContent=`Spilledag ${s[0]} · ${s[1]} ${s[2]}: ${getTeam(s[3]).name} vs ${getTeam(s[4]).name}`;
    sel.appendChild(o);
  });
  if(cur!=='') sel.value=cur;
}

function renderDetail() {
  const sel=document.getElementById('detail-select');
  const out=document.getElementById('detail-output');
  if(sel.value===''){out.innerHTML='<div class="detail-select-hint">Vælg en kamp for at se detaljerne.</div>';return;}
  const i=parseInt(sel.value),s=schedule[i],d=matchData[i];
  const home=getTeam(s[3]),away=getTeam(s[4]);
  const hK=sumKast(d.home_players),aK=sumKast(d.away_players);
  const hS=sumSP(d.home_players),aS=sumSP(d.away_players);
  const got=hasData(d);

  function panel(team, players, totK, totS) {
    const rows=players.map((p,pi)=>`
      <div class="detail-player-row">
        <span class="pnum">#${pi+1}</span>
        <span>${p.name||`Spiller ${pi+1}`}</span>
        <span class="pval">${p.kast!==''?p.kast:'—'}</span>
        <span class="pval">${p.sp!==''?p.sp:'—'}</span>
      </div>`).join('');
    return `<div class="detail-team-panel">
      <div class="detail-team-header">
        <div class="detail-team-logo" style="background:${teamLogos[team.id]?'transparent':team.color}">${teamLogos[team.id]?`<img src="${teamLogos[team.id]}" style="width:100%;height:100%;object-fit:contain;border-radius:50%">`:team.abbr}</div>
        <div class="detail-team-name">${team.name}</div>
      </div>
      <div class="detail-col-headers">
        <span>#</span><span>Navn</span><span>Kast</span><span>Single Pt</span>
      </div>
      ${rows}
      <div class="detail-totals-bar">
        <span>Kast i alt: <strong>${got?totK:'—'}</strong></span>
        <span>Single Point: <strong class="sp-val">${got?totS:'—'}</strong></span>
      </div>
    </div>`;
  }

  out.innerHTML=`<div class="detail-card">
    <div class="detail-card-title">Kampdag #${s[0]}</div>
    <div class="detail-location-bar">📍 ${d.location||'Sted ikke angivet'} · ${s[1]}, ${s[2]}</div>
    <div class="detail-teams-row">
      ${panel(home,d.home_players,hK,hS)}
      ${panel(away,d.away_players,aK,aS)}
    </div>
    <div class="detail-final-scores">
      <div class="detail-final-score" style="background:${home.color}22;border:1px solid ${home.color}55;color:${home.color}">${got?matchPts(d).h:'—'}</div>
      <div class="detail-final-score" style="background:${away.color}22;border:1px solid ${away.color}55;color:${away.color}">${got?matchPts(d).a:'—'}</div>
    </div>
  </div>
  <div style="text-align:center;margin-top:12px;">
    <button class="btn-save" onclick="openModal(${i})">✏️ Rediger resultat</button>
  </div>`;
}

function openModal(idx) {
  currentMatchIdx=idx;
  const s=schedule[idx],d=matchData[idx];
  const home=getTeam(s[3]),away=getTeam(s[4]);
  document.getElementById('modal-match-info').textContent=`Spilledag ${s[0]} · ${s[1]}, ${s[2]}`;
  document.getElementById('modal-day').value=s[1];
  document.getElementById('modal-date').value=s[2];
  document.getElementById('modal-location').value=d.location;

  function teamCol(team, players, side) {
    return `<div class="modal-team-col">
      <div class="modal-team-col-header">
        <div class="modal-team-col-logo" style="background:${teamLogos[team.id]?'transparent':team.color}">${teamLogos[team.id]?`<img src="${teamLogos[team.id]}" style="width:100%;height:100%;object-fit:contain;border-radius:50%">`:team.abbr}</div>
        <span class="modal-team-col-name">${team.name}</span>
      </div>
      <div class="modal-col-headers">
        <span></span><span>Navn</span><span style="text-align:center">Kast</span><span style="text-align:center">Single Pt</span>
      </div>
      <div class="modal-player-rows">
        ${players.map((p,pi)=>`
          <div class="modal-player-row">
            <span class="modal-player-row-num">${pi+1}</span>
            <input class="minput" id="${side}-n-${pi}" placeholder="Spiller ${pi+1}" value="${p.name}">
            <input class="minput center" type="number" id="${side}-k-${pi}" placeholder="0" value="${p.kast}" min="0">
            <input class="minput center" type="number" id="${side}-s-${pi}" placeholder="0" value="${p.sp}" min="0">
          </div>`).join('')}
      </div>
    </div>`;
  }

  document.getElementById('modal-teams-grid').innerHTML=teamCol(home,d.home_players,'h')+teamCol(away,d.away_players,'a');
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); currentMatchIdx=null; }
function closeModalOutside(e) { if(e.target===document.getElementById('modal'))closeModal(); }

function saveMatch() {
  if(currentMatchIdx===null)return;
  const d=matchData[currentMatchIdx];
  schedule[currentMatchIdx][1]=document.getElementById('modal-day').value;
  schedule[currentMatchIdx][2]=document.getElementById('modal-date').value;
  d.location=document.getElementById('modal-location').value;
  [0,1,2].forEach(pi=>{
    d.home_players[pi]={name:document.getElementById(`h-n-${pi}`).value,kast:document.getElementById(`h-k-${pi}`).value,sp:document.getElementById(`h-s-${pi}`).value};
    d.away_players[pi]={name:document.getElementById(`a-n-${pi}`).value,kast:document.getElementById(`a-k-${pi}`).value,sp:document.getElementById(`a-s-${pi}`).value};
  });
  closeModal();
  renderMatchdays(); computeStandings(); renderDetail(); renderPlayers();
  saveToLocalStorage();
}

function showView(name,btn) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById(`view-${name}`).classList.add('active');
  btn.classList.add('active');
}

// Load saved data from localStorage
(function() {
  try {
    const saved = localStorage.getItem('pmc2026');
    if(saved) {
      const data = JSON.parse(saved);
      if(data.schedule) data.schedule.forEach((s,i) => { if(schedule[i]) { schedule[i][1]=s[1]; schedule[i][2]=s[2]; } });
      if(data.matchData) Object.keys(data.matchData).forEach(i => { matchData[i] = data.matchData[i]; });
    }
  } catch(e) { console.warn('Could not load saved data', e); }
})();
populateDetailSelect(); computeStandings(); renderMatchdays(); renderPlayers();

function saveToLocalStorage() {
  try {
    const data = { schedule: schedule, matchData: matchData };
    localStorage.setItem('pmc2026', JSON.stringify(data));
  } catch(e) { console.warn('Could not save data', e); }
}

function exportData() {
  saveToLocalStorage();
  // Show toast
  const toast = document.getElementById('save-toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}
</script>

<div id="save-toast" style="
  position:fixed; bottom:32px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--win); color:#fff; padding:10px 24px; border-radius:10px;
  font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600;
  opacity:0; transition:opacity 0.3s, transform 0.3s; pointer-events:none; z-index:9999;
">✓ Gemt!</div>
<style>
  #save-toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</body>
</html>
